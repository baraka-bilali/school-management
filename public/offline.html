<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#4f46e5" />
  <title>Hors ligne — Kelasi 360</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, sans-serif;
      background: linear-gradient(160deg, #111827 0%, #1e1b4b 100%);
      color: #f9fafb;
      padding: 1.5rem;
      padding-bottom: max(1.5rem, env(safe-area-inset-bottom));
    }
    .card {
      max-width: 22rem;
      width: 100%;
      text-align: center;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 1.25rem;
      padding: 2rem 1.5rem;
      backdrop-filter: blur(12px);
    }
    .icon {
      width: 4rem;
      height: 4rem;
      margin: 0 auto 1.25rem;
      border-radius: 1rem;
      background: rgba(79,70,229,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.75rem;
    }
    h1 { font-size: 1.25rem; font-weight: 700; margin-bottom: 0.5rem; }
    p { font-size: 0.875rem; color: #9ca3af; line-height: 1.5; margin-bottom: 1.5rem; }
    button {
      width: 100%;
      padding: 0.75rem 1rem;
      border: none;
      border-radius: 0.75rem;
      background: #4f46e5;
      color: white;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
    }
    button:active { opacity: 0.9; }
    .brand { margin-top: 1.25rem; font-size: 0.75rem; color: #6b7280; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>Vous êtes hors ligne</h1>
    <p>Vérifiez votre connexion internet, puis réessayez. Kelasi 360 reprendra dès que le réseau sera disponible.</p>
    <button type="button" onclick="location.reload()">Réessayer</button>
    <p class="brand">Kelasi 360</p>
  </div>
</body>
</html>
